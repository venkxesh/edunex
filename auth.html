<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduNex Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-layer bg-layer--one"></div>
    <div class="bg-layer bg-layer--two"></div>

    <main class="section auth-page">
      <div class="container auth-shell">
        <div class="auth-card glass-card" id="authCard">
          <p class="eyebrow center">Welcome to EduNex</p>
          <h1 class="center" id="authTitle">Create your account</h1>
          <p class="auth-feedback" id="authFeedback" aria-live="polite"></p>

          <form id="signupForm" class="auth-form" novalidate>
            <label for="signupName">Name</label>
            <input id="signupName" name="name" type="text" required placeholder="Enter your name" />

            <label for="signupEmail">Email</label>
            <input id="signupEmail" name="email" type="email" required placeholder="you@example.com" />

            <label for="signupPassword">Password</label>
            <input id="signupPassword" name="password" type="password" required minlength="6" placeholder="Create a secure password" />

            <button class="btn" type="submit">Create Account</button>
          </form>

          <button class="btn btn-ghost google-btn" type="button">Continue with Google</button>

          <p class="toggle-text" id="toggleText">
            Already have an account?
            <button type="button" class="text-link" id="toggleAuth">Login</button>
          </p>

          <form id="loginForm" class="auth-form hidden" novalidate>
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" required placeholder="you@example.com" />

            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="password" type="password" required minlength="6" placeholder="Enter your password" />

            <button class="btn" type="submit">Login</button>
          </form>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
